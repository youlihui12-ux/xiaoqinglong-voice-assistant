name: Bug Report
description: File a report to help us improve Xiaoqinglong
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How did you encounter this bug?
      placeholder: |
        1. Run `npm run start:bridge`
        2. Speak to Xiaozhi...
        3. See error in logs...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please paste any relevant logs from the terminal or Mission Control dashboard. (Remove any secrets!)
  - type: input
    id: version
    attributes:
      label: Node.js Version
      placeholder: e.g., v20.10.0
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have run `npm run doctor` and fixed any local environment issues.
          required: true
        - label: I have removed all secrets (API keys, tokens) from the logs I pasted.
          required: true
